author: "sheepishgoat"
delete-after: True
changes:
  - rscadd: "The absorb mode for Vore now gradually saps fat from prey and adds it to the predator."
  - rscadd: "The option to the weight of current prey to show up on a pred has been added back in."
  - rscadd: "Upon digestion, vore will now transfer a small amount of permafat and calorite poisoning from the prey to the pred. (Assuming the proper preferences are enabled.)"
  - rscadd: "Simplemobs with the proper variable can now yield fatness when digested."
  - rscadd: "Muscle will now be digested and added to predators as fat."
  - code_imp: "Added in a few helper procs."
  - code_imp: "Refactored the code for adding weight gain from digesting prey."